name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.1.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.jks 2>/dev/null
            if keytool -list -keystore ${{ github.workspace }}/release.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" >/dev/null 2>&1; then
              echo "valid=true" >> "$GITHUB_OUTPUT"
              echo "✅ Keystore decoded and validated"
            else
              echo "valid=false" >> "$GITHUB_OUTPUT"
              echo "⚠️ Keystore invalid, will use debug signing"
            fi
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ No keystore secret, will use debug signing"
          fi

      - name: Build release APK (signed)
        if: steps.keystore.outputs.valid == 'true'
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Build release APK (debug signed)
        if: steps.keystore.outputs.valid != 'true'
        run: ./gradlew assembleDebug

      - name: Get version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename APK (release)
        if: steps.keystore.outputs.valid == 'true'
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/Janus-${{ steps.version.outputs.name }}-arm64-v8a.apk

      - name: Rename APK (debug)
        if: steps.keystore.outputs.valid != 'true'
        run: |
          mkdir -p app/build/outputs/apk/release
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/release/Janus-${{ steps.version.outputs.name }}-arm64-v8a-debug.apk

      - name: Create tag (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.name }}" -m "v${{ steps.version.outputs.name }}"
          git push origin "v${{ steps.version.outputs.name }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Janus ${{ github.ref_name }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/Janus-*.apk

      - name: Sync Xposed Modules Repo (README + metadata)
        env:
          XPOSED_TOKEN: ${{ secrets.XPOSED_REPO_TOKEN }}
        run: |
          # Sync README
          git clone --depth 1 "https://x-access-token:${XPOSED_TOKEN}@github.com/Xposed-Modules-Repo/org.pysh.janus.git" xposed-repo
          cp README.md README_CN.md xposed-repo/
          cd xposed-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md README_CN.md
          git diff --cached --quiet || git commit -m "Sync README from main repo ${{ github.ref_name }}"
          git push
          cd ..
          # Set homepage for modules.lsposed.org website field
          curl -s -X PATCH \
            -H "Authorization: token ${XPOSED_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Xposed-Modules-Repo/org.pysh.janus \
            -d '{"homepage":"https://github.com/penguinyzsh/janus"}'

      - name: Publish to Xposed Modules Repo
        uses: softprops/action-gh-release@v2
        with:
          repository: Xposed-Modules-Repo/org.pysh.janus
          token: ${{ secrets.XPOSED_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: Janus ${{ github.ref_name }}
          generate_release_notes: false
          body: "https://github.com/penguinyzsh/janus/releases/tag/${{ github.ref_name }}"
          files: app/build/outputs/apk/release/Janus-*.apk
